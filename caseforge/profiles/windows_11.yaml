# OS-Profil: Windows 11 23H2  (CaseForge)
platform: windows
os_version: "11-23H2"
device_examples: ["Notebook (privat)"]
fs_root: "C"
timestamp_formats: ["filetime", "webkit_micros", "iso8601"]
key_facts:
  - "Registry-Hives SAM/SYSTEM/SOFTWARE/NTUSER/Amcache/UsrClass (regf)"
  - "EVTX template-basiertes BinXML; Edge=Chromium"
  - "Offen/Folgearbeit: SRUDB.dat (ESE), valides Prefetch-SCCA, $MFT/$UsnJrnl"
generators: [win.hives, win.files, win.browser, win.extra, win.lnk, win.evtx]
notes: "Win10-Profil: ShimCache-Format abweichend; eigenes Profil anlegen."
artifact_overrides:
  shimcache: true            # ShimCache/AppCompatCache im SYSTEM-Hive
  usnjrnl: true              # $UsnJrnl:$J (USN_RECORD_V2)
  mft: true                  # $MFT (FILE-Records) erzeugen
  srum: true                 # SRUDB.dat (ESE-Header-Stub) erzeugen
  pca: true                  # PCA-Ausfuehrungsspuren ab Windows 11 22H2
  recall: false
