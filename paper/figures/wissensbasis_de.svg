<svg viewBox="0 0 920 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">CaseForge — Wissensbasis-Kreislauf (Anlernen &amp; Anwenden)</title>
  <desc id="d">Anlernen: Experten-Freitext wird vom LLM zu einem Entwurf strukturiert und vom Menschen freigegeben — so waechst die Wissensbasis der Problemstellungen. Anwenden: aus der Wissensbasis werden Problemstellungen automatisch, deterministisch oder manuell ausgewaehlt, ins PROPOSE eingewoben (forensic_problems), vom Menschen geprueft und deterministisch gebaut. Zwei Mensch-in-the-loop-Punkte, eingerahmt von Ethik-Leitplanken.</desc>

  <rect x="0" y="0" width="920" height="380" fill="#ffffff"/>

  <!-- Ethics guardrail frame -->
  <rect x="10" y="96" width="900" height="200" rx="16" fill="none" stroke="#b5482f" stroke-width="1.2" stroke-dasharray="2 5" opacity="0.85"/>
  <text x="26" y="116" font-size="11" font-weight="700" letter-spacing="0.4" fill="#b5482f">ETHIK-LEITPLANKEN · synthetic_training_data_only · Anonymisierung beim Anlernen</text>

  <!-- role bands -->
  <text x="200" y="140" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.4" fill="#b5482f">ANLERNEN — Mensch reichert das Wissen an</text>
  <text x="718" y="140" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.4" fill="#6b7280">ANWENDEN — KI komponiert den Fall</text>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- arrows between nodes -->
  <g stroke="#6b7280" stroke-width="2">
    <line x1="128" y1="195" x2="143" y2="195" marker-end="url(#ah)"/>
    <line x1="255" y1="195" x2="270" y2="195" marker-end="url(#ah)"/>
    <line x1="382" y1="195" x2="397" y2="195" marker-end="url(#ah)"/>
    <line x1="519" y1="195" x2="534" y2="195" marker-end="url(#ah)"/>
    <line x1="646" y1="195" x2="661" y2="195" marker-end="url(#ah)"/>
    <line x1="773" y1="195" x2="788" y2="195" marker-end="url(#ah)"/>
  </g>

  <!-- arrow labels -->
  <g font-size="9" fill="#8a8f97" text-anchor="middle">
    <text x="135" y="188">teach</text>
    <text x="390" y="188">kuratiert</text>
    <text x="526" y="188">auswählen</text>
    <text x="780" y="188">verweben</text>
  </g>

  <!-- n1 Experten-Freitext -->
  <rect x="18" y="150" width="110" height="90" rx="10" fill="#ffffff" stroke="#c9ccd1" stroke-width="1.5"/>
  <text x="73" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2328">Experten-</text>
  <text x="73" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2328">Freitext</text>
  <text x="73" y="220" text-anchor="middle" font-size="9.5" fill="#8a8f97">(anonymisiert)</text>

  <!-- n2 LLM strukturiert (agent) -->
  <rect x="145" y="150" width="110" height="90" rx="10" fill="#fdf6f4" stroke="#b5482f" stroke-width="2"/>
  <text x="200" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2328">LLM</text>
  <text x="200" y="200" text-anchor="middle" font-size="11" fill="#5b6068">strukturiert</text>
  <text x="200" y="218" text-anchor="middle" font-size="11" fill="#5b6068">→ Entwurf</text>

  <!-- n3 Mensch Freigabe (human) -->
  <rect x="272" y="150" width="110" height="90" rx="10" fill="#ffffff" stroke="#b5482f" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="327" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2328">Mensch:</text>
  <text x="327" y="202" text-anchor="middle" font-size="11.5" fill="#5b6068">Freigabe ✓</text>

  <!-- hub: Wissensbasis (cylinder) -->
  <g>
    <path d="M399 165 v60 a60 12 0 0 0 120 0 v-60" fill="#f3eceb" stroke="#b5482f" stroke-width="1.6"/>
    <ellipse cx="459" cy="165" rx="60" ry="12" fill="#f3eceb" stroke="#b5482f" stroke-width="1.6"/>
    <text x="459" y="188" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1f2328">Wissensbasis</text>
    <text x="459" y="204" text-anchor="middle" font-size="10" fill="#5b6068">Problemstellungen</text>
    <text x="459" y="219" text-anchor="middle" font-size="9.5" fill="#8a8f97">(approved)</text>
  </g>

  <!-- n5 Auswahl -->
  <rect x="534" y="150" width="112" height="90" rx="10" fill="#ffffff" stroke="#c9ccd1" stroke-width="1.5"/>
  <text x="590" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2328">Auswahl</text>
  <text x="590" y="199" text-anchor="middle" font-size="10" fill="#5b6068">auto · match ·</text>
  <text x="590" y="214" text-anchor="middle" font-size="10" fill="#5b6068">manuell</text>

  <!-- n6 PROPOSE (agent) -->
  <rect x="661" y="150" width="112" height="90" rx="10" fill="#fdf6f4" stroke="#b5482f" stroke-width="2"/>
  <text x="717" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2328">PROPOSE</text>
  <text x="717" y="199" text-anchor="middle" font-size="10" fill="#5b6068">forensic_</text>
  <text x="717" y="214" text-anchor="middle" font-size="10" fill="#5b6068">problems</text>

  <!-- n7 Mensch Review -> Build (human) -->
  <rect x="788" y="150" width="112" height="90" rx="10" fill="#ffffff" stroke="#b5482f" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="844" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2328">Mensch:</text>
  <text x="844" y="199" text-anchor="middle" font-size="10.5" fill="#5b6068">Review →</text>
  <text x="844" y="214" text-anchor="middle" font-size="10.5" fill="#5b6068">det. Build</text>

  <!-- output note -->
  <text x="718" y="270" text-anchor="middle" font-size="10.5" fill="#5b6068">→ deterministischer Fall + Report (Lösungswege), tool-validiert</text>

  <!-- legend -->
  <g font-size="10.5" fill="#6b7280">
    <rect x="18" y="330" width="13" height="13" rx="3" fill="#fdf6f4" stroke="#b5482f" stroke-width="2"/>
    <text x="37" y="341">LLM (strukturiert &amp; komponiert)</text>
    <rect x="248" y="330" width="13" height="13" rx="3" fill="#ffffff" stroke="#b5482f" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="267" y="341">Mensch (Freigabe &amp; Review)</text>
    <rect x="470" y="330" width="13" height="13" rx="3" fill="#f3eceb" stroke="#b5482f" stroke-width="1.6"/>
    <text x="489" y="341">kuratiertes Expertenwissen (Korpus)</text>
  </g>
</svg>
